<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <header>
        <div class="_logo">
            <a href="./home.html">
                <img alt="logo" src="IMG/icon_dark_theme.png">
            </a>
        </div>

        <div class="_menu">
            <a href="./home.html">Início</a>
            <a href="./about.html">Sobre</a>
            <a href="./team.html">Equipe</a>
        </div>
    </header>
<div class="_content-login">
    <div class="_login">
        <form class="._form_login" action="button" method="POST">
            <div>
                <label type="email" >Usúario</label>
                <input type="email" id="email" placeholder="email@exaple.com" name="username" required>
            </div>
            <div class="password-div">
                <label type="password">Senha</label>
                <input type="password" autocomplete="" id="password" placeholder="***********" name="password" required>
                <i class="bi bi-eye" id="btn-senha" onclick="alternateEye()"></i>
            </div>
            <div class="login-option">
                <a>não tem uma conta? clique aqui para criar.</a>
                <button type="submit" onclick="login()">Entrar</button>
            </div>
        </form>
    </div>
</div>

    </body>
</html>
