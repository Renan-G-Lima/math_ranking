<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Aqui será o login ou criação de conta</h1>
    <form action="#" method="POST">
        <label for="username">Usúario</label>
        <input type="text" id="email" placeholder="email@exaple.com" name="username" required>

        <label for="password">Senha</label>
        <input type="text" id="password" placeholder="***********" name="password" required>

        <button type="submit" onclick="login()">Entrar</button>
    </form>

    <script src="SCRIPT/script.js"></script>
    </body>
</html>
