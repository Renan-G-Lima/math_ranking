<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="_general-conteiner">
        <div class="_box"></div>
        <div class="_login-div">
            <div class="_logo">
                <img alt="logo" src="../../IMG/icon_dark_theme.png">
            </div>
            <form>
                <label>Email</label>
                <input type="email" autocomplete="email" placeholder="Login">

                <div class="_captcha">Re captcha</div>

                <label>Senha</label>
                <div class="_password-div">
                    <input class="password" type="password" autocomplete="current-password" placeholder="********">
                    <i class="bi bi-eye" id="btn-senha" onclick="alternateEye()"></i>
                </div>

                <button type="submit">Entrar</button>
            </form>

            <p>ou realize o login utilizando:</p>
            <div class="_auth-button">
                <i class="bi bi-google" id="oauth" onclick="alternateEye()"></i>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
